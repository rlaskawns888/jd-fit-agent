services:
  app:
    build: .
    container_name: jd-fit-agent-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - jd-fit-agent-network

  db:
    image: postgres:17
    container_name: jd-fit-agent-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - jd-fit-agent-network

volumes:
  postgres_data:

networks:
  jd-fit-agent-network: